name: CI-Unit-Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        # v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        # --frozen-lockfile est crucial pour la résilience de ta CI
        run: bun install --frozen-lockfile

      - name: Build
        # needed for version.ts creation
        run: bun run build

      - name: Run tests
        # On active la couverture pour alimenter Codecov
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=./coverage --coverage-skip-test-files

      - name: Verify coverage file (Pragmatic Debug)
        # check file before upload
        run: ls -l ./coverage/lcov.info

      - name: Upload coverage reports to Codecov
         # v5.5.4
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          directory: ./coverage/
          fail_ci_if_error: true
