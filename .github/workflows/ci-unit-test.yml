name: CI-Unit-Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # --frozen-lockfile est crucial pour la résilience de ta CI
        run: bun install --frozen-lockfile

      - name: Build
        # needed for version.ts creation
        run: bun run build

      - name: Run tests
        # On active la couverture pour alimenter Codecov
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Bun génère un fichier lcov.info dans le dossier ./coverage par défaut
          file: ./coverage/lcov.info
